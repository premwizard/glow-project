<!DOCTYPE html>
<html lang="en" ng-app="antigravityApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon - Interactive Anti-Gravity Experience</title>
  <meta name="description"
    content="A premium futuristic anti-gravity experience. Interactive floating particles and magnetic fields. Coming soon.">

  <!-- SEO & Social Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Anti-Gravity">
  <meta property="og:title" content="Anti-Gravity - Coming Soon">
  <meta property="og:description" content="Interactive floating particles and anti-gravity magnetic field experience.">

  <!-- Google Fonts: Outfit for display, Space Grotesk/Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Outfit:wght@300..800&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>

<body ng-controller="AntigravityController">
  <!-- Fullscreen Interactive Canvas Background -->
  <canvas id="gravity-canvas" antigravity-canvas></canvas>
  <canvas id="dust-canvas"></canvas>

  <!-- Luxury Minimal Interface Overlay -->
  <main class="main-container">
    <div class="coming-soon-wrapper">

      <!-- Glowing Globe Logo Wrapper -->
      <div class="logo-wrapper">
        <div class="logo-container">
          <svg class="globe-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="peacock-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#38BDF8" />
                <stop offset="40%" stop-color="#1D4ED8" />
                <stop offset="80%" stop-color="#7C3AED" />
                <stop offset="100%" stop-color="#EE9B00" />
              </linearGradient>
              <filter id="svg-glow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>

            <!-- Globe Outer Ring -->
            <circle class="globe-outline" cx="50" cy="50" r="44" stroke="url(#peacock-glow-grad)" stroke-width="1.2"
              filter="url(#svg-glow)" />

            <!-- Latitudes (Horizontal grid curves) -->
            <path class="globe-grid" d="M 6 50 L 94 50" stroke="url(#peacock-glow-grad)" stroke-width="0.8"
              opacity="0.8" />
            <path class="globe-grid" d="M 14.5 30 Q 50 40 85.5 30" stroke="url(#peacock-glow-grad)" stroke-width="0.6"
              opacity="0.6" />
            <path class="globe-grid" d="M 14.5 70 Q 50 60 85.5 70" stroke="url(#peacock-glow-grad)" stroke-width="0.6"
              opacity="0.6" />
            <path class="globe-grid" d="M 28 16 Q 50 24 72 16" stroke="url(#peacock-glow-grad)" stroke-width="0.4"
              opacity="0.4" />
            <path class="globe-grid" d="M 28 84 Q 50 76 72 84" stroke="url(#peacock-glow-grad)" stroke-width="0.4"
              opacity="0.4" />

            <!-- Longitudes (Vertical grid curves) -->
            <path class="globe-grid" d="M 50 6 L 50 94" stroke="url(#peacock-glow-grad)" stroke-width="0.8"
              opacity="0.8" />
            <path class="globe-grid" d="M 50 6 Q 32 50 50 94" stroke="url(#peacock-glow-grad)" stroke-width="0.6"
              opacity="0.6" />
            <path class="globe-grid" d="M 50 6 Q 14 50 50 94" stroke="url(#peacock-glow-grad)" stroke-width="0.4"
              opacity="0.4" />
            <path class="globe-grid" d="M 50 6 Q 68 50 50 94" stroke="url(#peacock-glow-grad)" stroke-width="0.6"
              opacity="0.6" />
            <path class="globe-grid" d="M 50 6 Q 86 50 50 94" stroke="url(#peacock-glow-grad)" stroke-width="0.4"
              opacity="0.4" />
          </svg>
          <!-- Ambient glowing energy fields -->
          <div class="glow-ring"></div>
          <div class="glow-energy"></div>
        </div>
      </div>

      <!-- Modern Futuristic Coming Soon Typography -->
      <div class="text-container">
        <h1 class="coming-soon-title" ng-bind="::title">COMING SOON</h1>
      </div>

    </div>
  </main>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <!-- Anti-Gravity Engine & Angular Application -->
  <script src="gravity-engine.js"></script>
  <script src="app.module.js"></script>
  <script src="app.controller.js"></script>
  <script src="app.directive.js"></script>

  <!-- Secondary Floating Dust Particle System -->
  <script>
    (function() {
      const canvas = document.getElementById('dust-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
      const particleCount = isMobile ? 12 : 28;
      const particles = [];
      
      const colors = [
        'rgba(56, 189, 248, ',  // sky blue
        'rgba(124, 58, 237, ', // purple glow
        'rgba(248, 250, 252, '  // soft white
      ];

      class DustParticle {
        constructor() {
          this.reset();
          this.y = Math.random() * height;
        }

        reset() {
          this.x = Math.random() * width;
          this.y = height + 10;
          this.size = Math.random() * 1.5 + 0.5;
          this.speedY = -(Math.random() * 0.22 + 0.05);
          this.speedX = (Math.random() * 0.08 - 0.04);
          this.colorBase = colors[Math.floor(Math.random() * colors.length)];
          this.maxOpacity = Math.random() * 0.28 + 0.04;
          this.opacity = 0;
          this.fadeInSpeed = Math.random() * 0.008 + 0.002;
          this.depth = Math.random();
          this.blur = this.depth > 0.65 ? 1 : 0;
        }

        update() {
          this.y += this.speedY;
          this.x += this.speedX;

          if (this.opacity < this.maxOpacity) {
            this.opacity += this.fadeInSpeed;
          }

          if (this.y < -10 || this.x < -10 || this.x > width + 10) {
            this.reset();
          }
        }

        draw() {
          ctx.beginPath();
          if (this.blur > 0) {
            ctx.filter = `blur(${this.blur}px)`;
          } else {
            ctx.filter = 'none';
          }
          ctx.fillStyle = this.colorBase + this.opacity + ')';
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < particleCount; i++) {
        particles.push(new DustParticle());
      }

      function animate() {
        if (document.hidden) {
          requestAnimationFrame(animate);
          return;
        }
        
        ctx.clearRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'screen';
        
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        
        ctx.filter = 'none';
        requestAnimationFrame(animate);
      }

      animate();
    })();
  </script>
</body>

</html>
